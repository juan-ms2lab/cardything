version: "3.9"

services:
  # Development
  cardything-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: cardything-dev
    restart: unless-stopped
    env_file: .env.dev
    ports:
      - "3010:3000"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./prisma:/app/prisma
    networks:
      - main-net
      - db-net

  # Production
  cardything-prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: cardything-prod
    restart: unless-stopped
    env_file: .env.prod
    ports:
      - "3011:3000"
    networks:
      - main-net
      - db-net

networks:
  main-net:
    external: true
  db-net:
    external: true
